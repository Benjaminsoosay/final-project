<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Explorer | WDD330 Final Project</title>
    <link rel="stylesheet" href="/final-project/css/style.css">
</head>
<body>
    <header>
        <h1>🛍️ Product Explorer</h1>
        <div class="cart-icon">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <main>
        <div class="filters">
            <input type="text" id="search" placeholder="Search products..." class="search-input">
            <select id="category-filter">
                <option value="all">All Categories</option>
                <option value="electronics">Electronics</option>
                <option value="jewelery">Jewelery</option>
                <option value="men's clothing">Men's Clothing</option>
                <option value="women's clothing">Women's Clothing</option>
            </select>
        </div>

        <div id="product-list" class="product-grid"></div>
        <div id="product-fact" class="fact-box"></div>
    </main>

    <!-- Product Details Modal -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modal-body"></div>
            <button id="add-to-cart-modal" class="btn">Add to Cart</button>
            <div id="recommendations" class="recommendations"></div>
        </div>
    </div>

    <script src="/final-project/script.js/javascript"></script>
</body>
</html>
